server:
  port : 8080
  servlet:
    context-path: /electric

spring:
  datasource:
    url: "jdbc:mysql://localhost:3306/electric"
    driverClassName: "com.mysql.cj.jdbc.Driver"
    username: root
    password: 123456
  jpa:
    hibernate:
      ddl-auto : update
    show-sql : true
    defer-datasource-initialization: true
  sql:
    init:
      mode: always